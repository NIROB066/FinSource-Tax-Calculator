name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare web files
        run: |
          mkdir -p web-dist
          cp "Tax Calculator/index.html"    web-dist/
          cp "Tax Calculator/calculator.js" web-dist/
          cp "Tax Calculator/styles.css"    web-dist/
          cp "Tax Calculator/sw.js"         web-dist/
          cp "Tax Calculator/manifest.json" web-dist/
          cp "Tax Calculator/icon.png"      web-dist/
          touch web-dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
